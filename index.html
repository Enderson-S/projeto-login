<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/midia-query.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">
                <!-- Aqui vai a imagem nas CSS -->
            </div>
            <div id="formulario">

                <h1>Login</h1>

                <p>Seja bem-vindo(a) novamente. Faca login para acessar sua conta e poder fazer as configuracoes no seu ambiente.</p>

                <form action="login.php" method="post" autocomplete="on">

                    <label for="iemail">Email:</label>
                    <input type="email" name="email" id="iemail" required autocomplete="email">

                    <label for="isenha">Senha:</label>
                    <input type="password" name="senha" id="isenha" required autocomplete="current-password">
                </form>
            </div>
        </section>
    </main>
</body>
</html>
